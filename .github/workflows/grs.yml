name: update README cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=rose&size_weight=0.5&count_weight=0.5
          path: profile/top-langs.svg
          token: ${{ secrets.GH_REPO_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "Yangmoooo"
          git config user.email "yangmoooo@outlook.com"
          git add profile/*.svg
          git commit -m "update README cards" || exit 0
          git push
